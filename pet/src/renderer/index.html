<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pet</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
      #app { position: relative; width: 100vw; height: 100vh; }
      #app canvas { display: none; }
      #sprite-pet {
        position: absolute; inset: 3%;
        width: 94%; height: 94%;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }
      #fallback {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-family: system-ui; font-size: 13px;
        text-align: center; padding: 16px; pointer-events: none;
        text-shadow: 0 0 4px rgba(0,0,0,.8);
      }
      .hidden { display: none !important; }

      /* 对话气泡 + 输入框 */
      #chat {
        position: absolute; left: 12px; right: 12px; bottom: 12px;
        background: rgba(15, 12, 22, 0.88);
        border-radius: 20px;
        padding: 8px 14px;
        font-family: system-ui; font-size: 13px; color: #fff;
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        backdrop-filter: blur(8px);
      }
      #chat-input {
        width: 100%; background: transparent; color: #fff;
        border: 0; outline: 0; font-family: inherit; font-size: 13px;
        caret-color: #ffd866;
      }
      #chat-input::placeholder { color: rgba(255,255,255,0.45); }
      #chat.loading #chat-input::placeholder { color: #ffd866; }

      #reply {
        position: absolute; left: 12px; right: 12px; top: 24px;
        max-height: 40%; overflow: hidden;
        background: rgba(15, 12, 22, 0.88);
        border-radius: 16px;
        padding: 10px 14px;
        font-family: system-ui; font-size: 13px; color: #fff;
        line-height: 1.4;
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        backdrop-filter: blur(8px);
        opacity: 0; transition: opacity 200ms;
        pointer-events: none;
      }
      #reply.on { opacity: 1; }

      /* 大小调节按钮：默认隐藏，鼠标移到右上角时浮现。 */
      #size {
        position: absolute; top: 8px; right: 10px;
        display: flex; align-items: center; gap: 6px;
        padding: 8px;
        opacity: 0;
        transition: opacity 160ms;
      }
      #size:hover { opacity: 1; }
      #size.visible { opacity: 1; }
      #size button {
        width: 30px;
        height: 30px;
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 8px;
        background: rgba(15, 12, 22, 0.72);
        color: #fff;
        font: 700 18px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        box-shadow: 0 2px 12px rgba(0,0,0,0.35);
        backdrop-filter: blur(6px);
        cursor: pointer;
      }
      #size button:hover {
        background: rgba(32, 27, 44, 0.9);
        border-color: rgba(255,255,255,0.28);
      }
      #size button:active { transform: translateY(1px); }

      #pairing {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        padding: 18px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #fff;
        background: rgba(8, 10, 14, 0.76);
        backdrop-filter: blur(12px);
      }
      #pairing-panel {
        width: min(320px, 100%);
        background: rgba(18, 20, 28, 0.94);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(0,0,0,0.46);
        padding: 16px;
      }
      #pairing h1 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0;
      }
      #pairing label {
        display: block;
        margin: 10px 0 5px;
        font-size: 12px;
        color: rgba(255,255,255,0.72);
      }
      #pairing input {
        box-sizing: border-box;
        width: 100%;
        height: 34px;
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 6px;
        padding: 0 10px;
        background: rgba(255,255,255,0.08);
        color: #fff;
        outline: 0;
        font: inherit;
        font-size: 13px;
      }
      #pairing input:focus { border-color: #ffd866; }
      #pairing button {
        width: 100%;
        height: 34px;
        margin-top: 14px;
        border: 0;
        border-radius: 6px;
        background: #ffd866;
        color: #16120a;
        font-weight: 700;
        cursor: pointer;
      }
      #pairing-error {
        min-height: 16px;
        margin-top: 8px;
        color: #ff8f8f;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="fallback">正在加载桌宠动画…</div>
    <div id="reply"></div>
    <div id="size" aria-label="调整桌宠大小">
      <button id="size-down" type="button" title="缩小" aria-label="缩小">-</button>
      <button id="size-up" type="button" title="放大" aria-label="放大">+</button>
    </div>
    <form id="pairing" class="hidden">
      <div id="pairing-panel">
        <h1>连接桌宠房间</h1>
        <label for="pairing-server">服务器地址</label>
        <input id="pairing-server" type="url" placeholder="https://pet.example.com" autocomplete="off" />
        <label for="pairing-secret">房间密钥 / 配对码</label>
        <input id="pairing-secret" type="password" placeholder="输入你拿到的配对码" autocomplete="off" />
        <button type="submit">保存并连接</button>
        <div id="pairing-error"></div>
      </div>
    </form>
    <div id="chat" class="hidden">
      <input id="chat-input" type="text" placeholder="跟我说点什么…  (Enter 发送 / Esc 取消)" maxlength="200" />
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
