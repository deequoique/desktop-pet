<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Pet</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
      #app { width: 100vw; height: 100vh; }
      #fallback {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-family: system-ui; font-size: 13px;
        text-align: center; padding: 16px; pointer-events: none;
        text-shadow: 0 0 4px rgba(0,0,0,.8);
      }
      .hidden { display: none !important; }

      #hud {
        position: absolute; top: 4px; left: 6px;
        color: #b6f; font-family: ui-monospace, Menlo, monospace; font-size: 10px;
        line-height: 1.3; pointer-events: none;
        text-shadow: 0 0 3px rgba(0,0,0,.9);
        white-space: pre;
      }
      #flash {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        color: #ffd866; font-family: system-ui; font-size: 36px; font-weight: 800;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(0,0,0,.9), 0 0 2px #000;
        opacity: 0; transition: opacity 120ms;
      }
      #flash.on { opacity: 1; }

      /* 对话气泡 + 输入框 */
      #chat {
        position: absolute; left: 12px; right: 12px; bottom: 12px;
        background: rgba(15, 12, 22, 0.88);
        border-radius: 20px;
        padding: 8px 14px;
        font-family: system-ui; font-size: 13px; color: #fff;
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        backdrop-filter: blur(8px);
      }
      #chat-input {
        width: 100%; background: transparent; color: #fff;
        border: 0; outline: 0; font-family: inherit; font-size: 13px;
        caret-color: #ffd866;
      }
      #chat-input::placeholder { color: rgba(255,255,255,0.45); }
      #chat.loading #chat-input::placeholder { color: #ffd866; }

      #reply {
        position: absolute; left: 12px; right: 12px; top: 24px;
        max-height: 40%; overflow: hidden;
        background: rgba(15, 12, 22, 0.88);
        border-radius: 16px;
        padding: 10px 14px;
        font-family: system-ui; font-size: 13px; color: #fff;
        line-height: 1.4;
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        backdrop-filter: blur(8px);
        opacity: 0; transition: opacity 200ms;
        pointer-events: none;
      }
      #reply.on { opacity: 1; }

      /* 大小调节滑块（右上角浮层，默认半透明，hover 才明显） */
      #size {
        position: absolute; top: 8px; right: 10px;
        display: flex; align-items: center; gap: 8px;
        background: rgba(15, 12, 22, 0.6);
        border-radius: 14px;
        padding: 5px 12px;
        font-family: system-ui; font-size: 11px; color: #fff;
        box-shadow: 0 2px 12px rgba(0,0,0,0.35);
        backdrop-filter: blur(6px);
        opacity: 0.28; transition: opacity 160ms;
      }
      #size:hover { opacity: 1; }
      #size input[type="range"] {
        width: 96px; accent-color: #b6f; cursor: pointer;
      }
      #size-val { min-width: 34px; text-align: right; color: #ffd866; }

      #pairing {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        padding: 18px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #fff;
        background: rgba(8, 10, 14, 0.76);
        backdrop-filter: blur(12px);
      }
      #pairing-panel {
        width: min(320px, 100%);
        background: rgba(18, 20, 28, 0.94);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(0,0,0,0.46);
        padding: 16px;
      }
      #pairing h1 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0;
      }
      #pairing label {
        display: block;
        margin: 10px 0 5px;
        font-size: 12px;
        color: rgba(255,255,255,0.72);
      }
      #pairing input {
        box-sizing: border-box;
        width: 100%;
        height: 34px;
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 6px;
        padding: 0 10px;
        background: rgba(255,255,255,0.08);
        color: #fff;
        outline: 0;
        font: inherit;
        font-size: 13px;
      }
      #pairing input:focus { border-color: #ffd866; }
      #pairing button {
        width: 100%;
        height: 34px;
        margin-top: 14px;
        border: 0;
        border-radius: 6px;
        background: #ffd866;
        color: #16120a;
        font-weight: 700;
        cursor: pointer;
      }
      #pairing-error {
        min-height: 16px;
        margin-top: 8px;
        color: #ff8f8f;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="fallback">把任意 .vrm 文件放到 pet/public/sample.vrm<br/>（VRoid Hub 免费区可下载）</div>
    <div id="hud"></div>
    <div id="flash"></div>
    <div id="reply"></div>
    <div id="size">
      <span>大小</span>
      <input id="size-range" type="range" min="50" max="200" step="5" value="100" />
      <span id="size-val">100%</span>
    </div>
    <form id="pairing" class="hidden">
      <div id="pairing-panel">
        <h1>连接桌宠房间</h1>
        <label for="pairing-server">服务器地址</label>
        <input id="pairing-server" type="url" placeholder="https://pet.example.com" autocomplete="off" />
        <label for="pairing-secret">房间密钥 / 配对码</label>
        <input id="pairing-secret" type="password" placeholder="输入你拿到的配对码" autocomplete="off" />
        <button type="submit">保存并连接</button>
        <div id="pairing-error"></div>
      </div>
    </form>
    <div id="chat" class="hidden">
      <input id="chat-input" type="text" placeholder="跟我说点什么…  (Enter 发送 / Esc 取消)" maxlength="200" />
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
