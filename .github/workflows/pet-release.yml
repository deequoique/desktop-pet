name: Pet Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pet-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: pet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pet/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix ../web

      - name: Validate release secrets
        shell: pwsh
        run: |
          if ("${{ secrets.PET_SERVER_URL }}" -eq "") { throw "Missing repository secret: PET_SERVER_URL" }

      - name: Generate production config
        shell: pwsh
        run: |
          $config = @{
            serverUrl = "${{ secrets.PET_SERVER_URL }}"
          }
          $config | ConvertTo-Json | Out-File -Encoding utf8 config/production.json

      - name: Build installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always

  build-pet-macos:
    needs: build-pet-windows
    runs-on: macos-latest
    defaults:
      run:
        working-directory: pet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            pet/package-lock.json
            web/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix ../web

      - name: Validate release secrets
        run: test -n "${{ secrets.PET_SERVER_URL }}"

      - name: Generate production config
        env:
          PET_SERVER_URL: ${{ secrets.PET_SERVER_URL }}
        run: |
          node -e "require('fs').writeFileSync('config/production.json', JSON.stringify({serverUrl: process.env.PET_SERVER_URL}, null, 2))"

      - name: Build macOS packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist -- --mac --publish always

  build-server-linux:
    needs: build-pet-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Assemble Linux server bundle
        shell: bash
        run: |
          mkdir -p release-server/desktop-pet-server
          cp -R server/src server/node_modules release-server/desktop-pet-server/
          cp server/package.json server/package-lock.json server/.env.example server/start-linux.sh release-server/desktop-pet-server/
          chmod +x release-server/desktop-pet-server/start-linux.sh
          tar -C release-server -czf "desktop-pet-server-${GITHUB_REF_NAME}-linux-x64.tar.gz" desktop-pet-server

      - name: Upload Linux server bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" "desktop-pet-server-${GITHUB_REF_NAME}-linux-x64.tar.gz" --clobber
